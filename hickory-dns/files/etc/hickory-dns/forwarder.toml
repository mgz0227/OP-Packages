listen_addrs_ipv6 = ["::1"]

[[zones]]
zone = "."
zone_type = "External"

[[zones.stores]]
type = "forward"
options = { edns0 = false, ip_strategy = "Ipv6AndIpv4", cache_size = 0, use_hosts_file = "Never", num_concurrent_reqs = 1, server_ordering_strategy = "RoundRobin" }

[[zones.stores.name_servers]]
ip = "2400:3200:baba::1"
trust_negative_responses = true
connections = [
    { protocol = { type = "quic", server_name = "dns.alidns.com" } },
    { protocol = { type = "h3", server_name = "dns.alidns.com", path = "/dns-query", disable_grease = false } }
]

[[zones.stores.name_servers]]
ip = "1.12.12.12"
trust_negative_responses = true
connections = [
    { protocol = { type = "https", server_name = "doh.pub", path = "/dns-query" } },
    { protocol = { type = "tls", server_name = "dot.pub" } }
]

[[zones.stores.name_servers]]
ip = "2400:3200::1"
trust_negative_responses = true
connections = [
    { protocol = { type = "quic", server_name = "dns.alidns.com" } },
    { protocol = { type = "h3", server_name = "dns.alidns.com", path = "/dns-query", disable_grease = false } }
]

[[zones.stores.name_servers]]
ip = "120.53.53.53"
trust_negative_responses = true
connections = [
    { protocol = { type = "https", server_name = "doh.pub", path = "/dns-query" } },
    { protocol = { type = "tls", server_name = "dot.pub" } }
]
